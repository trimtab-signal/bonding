name: Generate Architecture Graph
on:
  push:
    paths:
      - 'apps/**/*.ts'
      - 'apps/**/*.tsx'
      - 'packages/**/*.ts'
      - 'packages/**/*.tsx'
      - '!**/*.stories.tsx'
  workflow_dispatch:

jobs:
  build-graph:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node scripts/generate-graph.js
      - name: Commit Graph JSON
        run: |
          git config --global user.name "P31 Architect Bot"
          git config --global user.email "bot@p31ca.org"
          git add docs/graph-data.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: auto-update architecture constellation graph"
          git push
