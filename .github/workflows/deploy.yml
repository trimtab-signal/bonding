name: Deploy — All Planes + Storybook + Architecture Map

on:
  push:
    branches: [master]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/**'
      - 'scripts/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-all:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:shared
      - name: Deploy delta-ignition
        run: pnpm deploy:delta-ignition
      - name: Deploy trim-sequence
        run: pnpm deploy:trim-sequence
      - name: Deploy fleet-status
        run: pnpm deploy:fleet-status
      - name: Deploy onboarding
        run: pnpm deploy:onboarding
      - name: Deploy onboarding-module
        run: pnpm deploy:onboarding-module
      - name: Deploy storybook
        run: pnpm deploy:storybook
      - name: Deploy architecture-map
        run: pnpm deploy:architecture-map

  graph-update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm graph
      - name: Commit graph update
        run: |
          git config --global user.name "P31 Architect Bot"
          git config --global user.email "bot@p31ca.org"
          git add docs/graph-data.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: auto-update architecture constellation graph [skip ci]"
          git push
