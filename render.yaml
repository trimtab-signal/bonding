services:
  - type: web
    name: bonding-server
    env: docker
    repo: https://github.com/trimtab-signal/bonding
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bonding-db
          property: connectionString
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
    healthCheckPath: /health

  - type: web
    name: bonding-onboarding
    env: static
    buildCommand: pnpm install && pnpm build:onboarding
    staticPublishPath: apps/onboarding/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 22

databases:
  - name: bonding-db
    plan: starter
    databaseType: postgres
    ipAllowList: []
