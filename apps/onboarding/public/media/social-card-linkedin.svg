  <text x="80" y="480" font-family="system-ui,sans-serif" font-size="24" fill="#2c241e" font-weight="600">🧪 Open source</text>
  <text x="80" y="560" font-family="system-ui,sans-serif" font-size="28" fill="#6b5f54">🧬 bonding.p31ca.org</text>
