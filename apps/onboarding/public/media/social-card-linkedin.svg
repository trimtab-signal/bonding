<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="627" viewBox="0 0 1200 627">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f4f0"/>
      <stop offset="100%" stop-color="#f0ebe4"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b6f5a"/>
      <stop offset="100%" stop-color="#b89d88"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="627" fill="url(#bg)"/>
  <text x="80" y="160" font-family="system-ui,sans-serif" font-size="56" font-weight="800" fill="#2c241e">BONDING — Real-World Social Game</text>
  <text x="80" y="240" font-family="system-ui,sans-serif" font-size="28" fill="#6b5f54">A location-based game that turns neighborhoods into</text>
