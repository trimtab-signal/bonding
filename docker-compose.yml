version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: bonding-db
    environment:
      POSTGRES_DB: bonding
      POSTGRES_USER: bonding
      POSTGRES_PASSWORD: bonding_dev
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./apps/server/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata:
